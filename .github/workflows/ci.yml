name: CI
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - name: Install Chromium
        run: python -m playwright install --with-deps chromium
      - name: Ruff
        shell: bash
        run: |
          mkdir -p artifacts/ci
          set -o pipefail
          ruff check . 2>&1 | tee artifacts/ci/ruff.log
      - name: Strict mypy
        shell: bash
        run: |
          mkdir -p artifacts/ci
          set -o pipefail
          mypy src tests 2>&1 | tee artifacts/ci/mypy.log
      - name: Pytest
        shell: bash
        run: |
          mkdir -p artifacts/ci
          set -o pipefail
          pytest 2>&1 | tee artifacts/ci/pytest.log
      - name: Deterministic audit
        shell: bash
        run: |
          mkdir -p artifacts/ci
          set -o pipefail
          python -m veridra.audit 2>&1 | tee artifacts/ci/audit.log
      - name: Browser audit
        shell: bash
        run: |
          mkdir -p artifacts/ci
          set -o pipefail
          python tools/browser_audit.py 2>&1 | tee artifacts/ci/browser-audit.log
      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: veridra-verification
          path: artifacts
